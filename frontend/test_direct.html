<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试10日涨幅榜API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .loading { margin: 20px 0; padding: 20px; background-color: #f0f0f0; text-align: center; }
        .error { margin: 20px 0; padding: 20px; background-color: #ffe6e6; color: #ff0000; }
    </style>
</head>
<body>
    <h1>测试10日涨幅榜API</h1>
    <button onclick="fetchData()">获取2026-04-08数据</button>
    <div id="loading" style="display: none;" class="loading">加载中...</div>
    <div id="error" style="display: none;" class="error"></div>
    <table id="dataTable">
        <thead>
            <tr>
                <th>排名</th>
                <th>代码</th>
                <th>名称</th>
                <th>概念</th>
                <th>10日涨幅(%)</th>
                <th>单日涨幅(%)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script>
        function fetchData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tableBody = document.getElementById('tableBody');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            tableBody.innerHTML = '';
            
            // 直接调用API
            fetch('http://localhost:8000/api/tushare/ten-day-top30?target_date=20260408')
                .then(response => response.json())
                .then(data => {
                    loading.style.display = 'none';
                    if (data.success) {
                        data.data.forEach((stock, index) => {
                            const row = document.createElement('tr');
                            row.innerHTML = `
                                <td>${index + 1}</td>
                                <td>${stock.symbol}</td>
                                <td>${stock.name}</td>
                                <td>${stock.industry}</td>
                                <td>${stock.ten_day_change}</td>
                                <td>${stock.daily_change}</td>
                            `;
                            tableBody.appendChild(row);
                        });
                    } else {
                        error.textContent = data.message;
                        error.style.display = 'block';
                    }
                })
                .catch(err => {
                    loading.style.display = 'none';
                    error.textContent = '获取数据失败: ' + err.message;
                    error.style.display = 'block';
                });
        }
    </script>
</body>
</html>
